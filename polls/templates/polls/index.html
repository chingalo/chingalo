{% if qns %}
  <ol> {% for qn in qns%}
		  <li>
			 <h4> {{qn.question}}</h4>
		  </li>
		  <select>
			  <option value="">---</option>
			   {% for choice in choices %}
					
					{% if choice.poll == qn %}
						<option value="{{ choice.choice_text }}">{{ choice.choice_text }}</option>
					{% endif %}
				{% endfor %}
				</select>
				<br/>
			<p>
			   <a href="/{{qn.id}}/"> View </a> <br>
			   <a href="/{{qn.id}}/delete"> remove </a>
			   <br/>
			   <i>It was published in : {{qn.pub_date}}</i></br>
		   </p>
  {% endfor %}
  
    </ol>
 
{% else %}
 <p>not available</p>
 {% endif%}
 <a href="/createpoll/"> add new poll</a>
